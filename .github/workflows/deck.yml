name: Build & Deploy Deck to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/deck/**'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pandoc
        run: sudo apt-get install -y pandoc
      - name: Build Reveal.js deck
        run: |
          mkdir -p _site
          pandoc docs/deck/slides/*.md \
            -t revealjs -s --slide-level=1 \
            -V theme=white -V transition=slide \
            -V "header-includes=<style>:root{--r-link-color:#0085FF}.reveal h1,.reveal h2{color:#0085FF}</style>" \
            -o _site/index.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
